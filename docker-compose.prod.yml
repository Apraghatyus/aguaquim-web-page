# =============================================================================
# Docker Compose - Producción
#
# Compila la app y la sirve con Nginx en una imagen ultra-ligera.
# No incluye Node.js ni código fuente, solo los archivos estáticos
# optimizados (HTML, CSS, JS minificados).
#
# Uso: docker compose -f docker-compose.prod.yml up --build
# URL:  http://localhost (puerto 80)
# =============================================================================

services:
  aguaquim-web:
    build:
      context: .
      target: production
    container_name: aguaquim-web
    ports:
      - "8083:80"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
