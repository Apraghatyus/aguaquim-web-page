# =============================================================================
# Configuración de Nginx para AGUAQUIM Web Page (SPA)
#
# Esta configuración está optimizada para servir una Single Page Application
# de Vue.js en producción. Incluye:
#   - Routing SPA (redirige todas las rutas a index.html)
#   - Reverse proxy para /api → backend (evita CORS en producción)
#   - Cache de assets estáticos por 1 año
#   - Compresión gzip para reducir tamaño de transferencia
# =============================================================================

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Routing SPA: Si la URL solicitada no corresponde a un archivo real,
    # devuelve index.html para que Vue Router maneje la navegación.
    # Esto evita errores 404 al recargar la página en rutas como /servicios.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy para el backend API.
    # Las peticiones a /api/ se reenvían al backend, eliminando el prefijo /api.
    # Esto evita problemas de CORS porque el navegador ve todo como same-origin.
    # La variable $BACKEND_URL se sustituye en tiempo de ejecución del contenedor
    # (por defecto: http://backend:8000).
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Cache de assets estáticos: Los archivos generados por Vite incluyen
    # un hash en el nombre (ej: index-Qa-VUkVs.js), por lo que es seguro
    # cachearlos por 1 año. Si el contenido cambia, el hash cambia.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Compresión gzip: Reduce el tamaño de transferencia de archivos de texto
    # (JS, CSS, HTML, JSON, SVG) entre un 60-80%, acelerando la carga.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
}
